name: myapprun
description: "Modo Iraq E-commerce App"
publish_to: 'none'
version: 1.3.2+30

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.3
  shared_preferences: ^2.2.3
  flutter_staggered_grid_view: ^0.7.0
  video_player: ^2.8.6
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.2
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_messaging: ^16.0.4
  facebook_app_events: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.4 # تم نقلها هنا لتنظيم الكود

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

# === إعدادات أيقونة التطبيق (Modo App Icon) ===
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/modo_logo.png" # مسار اللوكو البرتقالي الجديد
  min_sdk_android: 21

# === إعدادات الشاشة الافتتاحية (Modo Splash Screen) ===
flutter_native_splash:
  color: "#ffffff" # خلفية بيضاء لتتناسب مع ألوان modo
  image: assets/icons/modo_logo.png # لوكو modo البرتقالي في المنتصف
  android: true
  ios: true
